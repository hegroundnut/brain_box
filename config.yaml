# BrainBox 类脑盒子服务器配置
# 所有配置项均可通过环境变量覆盖

box_id: "brain_box_001"           # 盒子唯一标识 (环境变量: BRAIN_BOX_ID)

edge:
  base_url: "http://192.168.1.100:8080"
  heartbeat_path: "/api/v1/brain-box/heartbeat"
  drone_report_path: "/api/v1/brain-box/drone-report"
  trajectory_report_path: "/api/v1/brain-box/trajectory-report"
  heartbeat_interval: 5.0    # 心跳间隔 (秒)
  report_interval: 2.0       # 状态上报间隔 (秒)
  timeout: 10.0              # HTTP 请求超时 (秒)

mavlink:
  # 多连接通道配置（每台无人机/每组无人机可以有独立通道）
  # 支持 UDP (udpin/udpout), TCP (tcp/tcpin), 串口 (/dev/ttyUSB0) 等
  connections:
    - connection_string: "udpin:0.0.0.0:14550"
      label: "udp_group_1"       # 通道标签（可选）
    # - connection_string: "udpin:0.0.0.0:14551"
    #   label: "udp_group_2"
    # - connection_string: "tcp:192.168.1.50:5762"
    #   label: "tcp_drone"
    # - connection_string: "/dev/ttyUSB0"
    #   label: "radio_link"
    #   baud_rate: 57600

  # 若未配置 connections，则回退到单连接模式:
  # connection_string: "udpin:0.0.0.0:14550"

  system_id: 255
  component_id: 0
  scan_interval: 3.0         # 无人机扫描间隔 (秒)
  heartbeat_timeout: 10.0    # 心跳超时 (秒)
  baud_rate: 57600           # 默认波特率（连接级可覆盖）

# 注意: server 配置段已移除，HTTP 服务端口由 main.py 独立管理

logging:
  level: "INFO"              # DEBUG / INFO / WARNING / ERROR
  console_enabled: true
  file_enabled: true
  log_dir: "logs"
  log_file: "brain_box.log"
  max_bytes: 10485760        # 10MB
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
