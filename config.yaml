# BrainBox 类脑盒子服务器配置
# 所有配置项均可通过环境变量覆盖

edge:
  base_url: "http://192.168.1.100:8080"
  heartbeat_path: "/api/v1/brain-box/heartbeat"
  drone_report_path: "/api/v1/brain-box/drone-report"
  trajectory_report_path: "/api/v1/brain-box/trajectory-report"
  heartbeat_interval: 5.0    # 心跳间隔 (秒)
  report_interval: 2.0       # 状态上报间隔 (秒)
  timeout: 10.0              # HTTP 请求超时 (秒)

mavlink:
  connection_string: "udpin:0.0.0.0:14550"  # MAVLink 连接串
  system_id: 255
  component_id: 0
  scan_interval: 3.0         # 无人机扫描间隔 (秒)
  heartbeat_timeout: 10.0    # 心跳超时 (秒)
  baud_rate: 57600

server:
  host: "0.0.0.0"
  port: 9000
  debug: false

logging:
  level: "INFO"              # DEBUG / INFO / WARNING / ERROR
  console_enabled: true
  file_enabled: true
  log_dir: "logs"
  log_file: "brain_box.log"
  max_bytes: 10485760        # 10MB
  backup_count: 5
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
